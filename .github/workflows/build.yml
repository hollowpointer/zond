name: Build Zond

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download and Configure Npcap SDK (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "npcap-sdk"
          echo "LIB=$env:GITHUB_WORKSPACE\npcap-sdk\Lib\x64;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Release Binary
        run: cargo build --release

      - name: Upload Binary (Linux & macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zond-${{ matrix.os }}-binary
          path: target/release/zond

      - name: Build Windows Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        run: iscc packaging/windows/zond_installer.iss

      - name: Upload Zond Setup (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zond-windows-installer
          path: target/release/Zond_Setup.exe

      - name: Install cargo-deb (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deb

      - name: Build Debian Package
        if: matrix.os == 'ubuntu-latest'
        run: cargo deb -p zond-cli

      - name: Upload Debian Package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zond-debian-package
          path: target/debian/*.deb
